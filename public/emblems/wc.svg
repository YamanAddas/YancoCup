<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- World Cup Trophy - Gold on dark -->
  <defs>
    <linearGradient id="wcGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="wcGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#wcGlow)">
    <!-- Trophy cup -->
    <path d="M22 12h20v4c0 8-4 16-10 18-6-2-10-10-10-18V12z" fill="url(#wcGold)" opacity="0.95"/>
    <!-- Left handle -->
    <path d="M22 14h-4c-2 0-4 2-4 4v2c0 3 2 5 5 5h3" stroke="url(#wcGold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right handle -->
    <path d="M42 14h4c2 0 4 2 4 4v2c0 3-2 5-5 5h-3" stroke="url(#wcGold)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Stem -->
    <rect x="30" y="34" width="4" height="8" rx="1" fill="url(#wcGold)"/>
    <!-- Base -->
    <ellipse cx="32" cy="46" rx="10" ry="3" fill="url(#wcGold)" opacity="0.9"/>
    <!-- Globe lines on cup -->
    <ellipse cx="32" cy="22" rx="7" ry="7" stroke="#FFF8DC" stroke-width="0.8" fill="none" opacity="0.4"/>
    <line x1="32" y1="15" x2="32" y2="29" stroke="#FFF8DC" stroke-width="0.6" opacity="0.3"/>
    <line x1="25" y1="22" x2="39" y2="22" stroke="#FFF8DC" stroke-width="0.6" opacity="0.3"/>
    <!-- 2026 text -->
    <text x="32" y="56" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#FFD700" opacity="0.8">2026</text>
  </g>
</svg>
