<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Premier League Lion - Purple/Magenta -->
  <defs>
    <linearGradient id="plGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e020a0"/>
      <stop offset="100%" stop-color="#8b1a8f"/>
    </linearGradient>
    <filter id="plGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#plGlow)">
    <!-- Shield shape -->
    <path d="M32 6L12 16v16c0 12 8 20 20 24 12-4 20-12 20-24V16L32 6z" fill="url(#plGrad)" opacity="0.15" stroke="url(#plGrad)" stroke-width="1.5"/>
    <!-- Stylized lion head -->
    <g transform="translate(32,34)" fill="url(#plGrad)">
      <!-- Mane -->
      <ellipse cx="0" cy="-6" rx="12" ry="10" fill="none" stroke="url(#plGrad)" stroke-width="2" opacity="0.7"/>
      <!-- Head -->
      <ellipse cx="0" cy="-4" rx="7" ry="7" opacity="0.9"/>
      <!-- Eyes -->
      <circle cx="-3" cy="-6" r="1.5" fill="#060b14"/>
      <circle cx="3" cy="-6" r="1.5" fill="#060b14"/>
      <!-- Eye shine -->
      <circle cx="-2.5" cy="-6.5" r="0.5" fill="#fff" opacity="0.8"/>
      <circle cx="3.5" cy="-6.5" r="0.5" fill="#fff" opacity="0.8"/>
      <!-- Nose -->
      <ellipse cx="0" cy="-3" rx="2" ry="1.2" fill="#060b14" opacity="0.7"/>
      <!-- Mouth -->
      <path d="M-2 -1 Q0 2 2 -1" stroke="#060b14" stroke-width="0.8" fill="none"/>
      <!-- Crown -->
      <path d="M-6,-12 L-4,-8 L-1,-11 L0,-7 L1,-11 L4,-8 L6,-12" stroke="#FFD700" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
    </g>
    <!-- PL text -->
    <text x="32" y="56" text-anchor="middle" font-family="Inter,sans-serif" font-size="6.5" font-weight="700" fill="url(#plGrad)" opacity="0.7">PREMIER</text>
  </g>
</svg>
