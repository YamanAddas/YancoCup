<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Serie A - Blue/Green Italian tricolor accent -->
  <defs>
    <linearGradient id="saGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00A1E4"/>
      <stop offset="100%" stop-color="#024494"/>
    </linearGradient>
    <linearGradient id="saTricolor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#009246"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CE2B37"/>
    </linearGradient>
    <filter id="saGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#saGlow)">
    <!-- Stylized A letter -->
    <path d="M32 8 L48 48 L42 48 L38 36 L26 36 L22 48 L16 48 Z" fill="url(#saGrad)" opacity="0.9"/>
    <!-- A crossbar with tricolor -->
    <rect x="24" y="30" width="16" height="3" rx="1" fill="url(#saTricolor)" opacity="0.9"/>
    <!-- Inner cutout of A -->
    <path d="M32 16 L37 30 L27 30 Z" fill="#060b14"/>
    <!-- Football at top -->
    <circle cx="32" cy="10" r="4" fill="none" stroke="url(#saGrad)" stroke-width="1" opacity="0.5"/>
    <!-- SERIE A text -->
    <text x="32" y="58" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="800" fill="url(#saGrad)" opacity="0.8">SERIE A</text>
  </g>
</svg>
