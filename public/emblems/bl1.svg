<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bundesliga - Red/White dynamic figure -->
  <defs>
    <linearGradient id="blGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF2020"/>
      <stop offset="100%" stop-color="#D40515"/>
    </linearGradient>
    <filter id="blGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#blGlow)">
    <!-- Red rounded square background -->
    <rect x="10" y="8" width="44" height="44" rx="8" fill="url(#blGrad)" opacity="0.9"/>
    <!-- Player silhouette kicking (white on red) -->
    <g fill="#FFFFFF" transform="translate(32,30)">
      <!-- Head -->
      <circle cx="2" cy="-12" r="4"/>
      <!-- Body -->
      <path d="M0,-8 Q2,-2 0,4" stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <!-- Kicking leg (right, extended) -->
      <path d="M0,4 L10,8 L16,4" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Standing leg -->
      <path d="M0,4 L-4,14" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Arms -->
      <path d="M0,-4 L-8,-8" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M0,-4 L8,-2" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Ball -->
      <circle cx="18" cy="2" r="3" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.9"/>
    </g>
    <!-- BUNDESLIGA text -->
    <text x="32" y="60" text-anchor="middle" font-family="Inter,sans-serif" font-size="5.5" font-weight="700" fill="url(#blGrad)" opacity="0.7">BUNDESLIGA</text>
  </g>
</svg>
