<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Champions League Starball - White/Silver with blue glow -->
  <defs>
    <linearGradient id="clStar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>
    <filter id="clGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="clBg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#1a3a6b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Subtle background glow -->
  <circle cx="32" cy="32" r="28" fill="url(#clBg)"/>
  <g filter="url(#clGlow)">
    <!-- Main circle -->
    <circle cx="32" cy="32" r="20" stroke="url(#clStar)" stroke-width="1.5" fill="none" opacity="0.9"/>
    <!-- 8-point star pattern (starball) -->
    <g transform="translate(32,32)" fill="url(#clStar)" opacity="0.95">
      <!-- Top star -->
      <polygon points="0,-18 2,-8 -2,-8"/>
      <!-- Top-right -->
      <polygon points="12.7,-12.7 5.7,-5.7 3.5,-7.8"/>
      <!-- Right -->
      <polygon points="18,0 8,2 8,-2"/>
      <!-- Bottom-right -->
      <polygon points="12.7,12.7 7.8,-3.5 5.7,5.7"/>
      <!-- Bottom -->
      <polygon points="0,18 -2,8 2,8"/>
      <!-- Bottom-left -->
      <polygon points="-12.7,12.7 -5.7,5.7 -3.5,7.8" />
      <!-- Left -->
      <polygon points="-18,0 -8,-2 -8,2"/>
      <!-- Top-left -->
      <polygon points="-12.7,-12.7 -7.8,3.5 -5.7,-5.7"/>
    </g>
    <!-- Inner stars ring -->
    <g transform="translate(32,32)" fill="url(#clStar)">
      <circle cx="0" cy="-12" r="1.8"/>
      <circle cx="8.5" cy="-8.5" r="1.8"/>
      <circle cx="12" cy="0" r="1.8"/>
      <circle cx="8.5" cy="8.5" r="1.8"/>
      <circle cx="0" cy="12" r="1.8"/>
      <circle cx="-8.5" cy="8.5" r="1.8"/>
      <circle cx="-12" cy="0" r="1.8"/>
      <circle cx="-8.5" cy="-8.5" r="1.8"/>
    </g>
  </g>
</svg>
