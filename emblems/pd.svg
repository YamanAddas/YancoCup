<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- La Liga - Vibrant multicolor star/ball -->
  <defs>
    <linearGradient id="pdGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#E8308C"/>
      <stop offset="100%" stop-color="#6B35FF"/>
    </linearGradient>
    <filter id="pdGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#pdGlow)">
    <!-- Football outline -->
    <circle cx="32" cy="30" r="18" stroke="url(#pdGrad)" stroke-width="2" fill="none" opacity="0.9"/>
    <!-- Pentagon panels -->
    <g stroke="url(#pdGrad)" stroke-width="1" fill="none" opacity="0.5">
      <polygon points="32,14 38,20 36,28 28,28 26,20"/>
      <polygon points="44,26 48,34 42,38 36,34 38,26"/>
      <polygon points="20,26 26,26 28,34 22,38 16,34"/>
      <polygon points="24,40 28,36 36,36 40,40 36,46"/>
    </g>
    <!-- Center star -->
    <polygon points="32,20 34,26 40,26 35,30 37,36 32,32 27,36 29,30 24,26 30,26" fill="url(#pdGrad)" opacity="0.85"/>
    <!-- LA LIGA text -->
    <text x="32" y="56" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="800" fill="url(#pdGrad)" opacity="0.8">LA LIGA</text>
  </g>
</svg>
