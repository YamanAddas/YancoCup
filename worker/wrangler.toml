name = "yancocup-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# KV namespace for cached scores
[[kv_namespaces]]
binding = "SCORES_KV"
id = "c28d05b0f84a402aa441c0473de4a35a"

# Cron Triggers — poll live scores
# Every 5 min during pre-tournament (leagues only).
# Switch to "* * * * *" (every 60s) during WC match windows (June 11 - July 19).
[triggers]
crons = ["*/5 * * * *"]

# Workers AI binding for news article rewriting
[ai]
binding = "AI"

# Secrets (set via `wrangler secret put`):
# FOOTBALL_DATA_API_KEY — football-data.org API key
# API_FOOTBALL_KEY — API-Football (api-sports.io) key
# ADMIN_KEY — admin endpoint authentication secret
# SUPABASE_URL — Supabase project URL
# SUPABASE_SERVICE_KEY — Supabase service role key (for article inserts)
