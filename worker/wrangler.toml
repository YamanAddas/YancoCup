name = "yancocup-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# KV namespace for cached scores
[[kv_namespaces]]
binding = "SCORES_KV"
id = "c28d05b0f84a402aa441c0473de4a35a"

# Cron Triggers — poll live scores
# Currently every 5 min (pre-tournament, leagues only).
#
# WC SWITCH (perform on/around 2026-06-10):
#   1. Change crons to ["* * * * *"] (every 60s)
#   2. In src/index.ts handleCron, simultaneously update tick thresholds to
#      keep periodic budgets unchanged:
#        tick % 5  → tick % 25  (5-min upcoming-week refresh)
#        tick % 10 → tick % 50  (50-min API-Football enrichment;
#                                MUST stay <=100 calls/day)
#   3. Revert thresholds AND cron after the WC final (2026-07-19) to save
#      API budget during off-season.
[triggers]
crons = ["*/5 * * * *"]

# Workers AI binding for news article rewriting
[ai]
binding = "AI"

# Secrets (set via `wrangler secret put`):
# FOOTBALL_DATA_API_KEY — football-data.org API key
# API_FOOTBALL_KEY — API-Football (api-sports.io) key
# ADMIN_KEY — admin endpoint authentication secret
# SUPABASE_URL — Supabase project URL
# SUPABASE_SERVICE_KEY — Supabase service role key (for article inserts)
